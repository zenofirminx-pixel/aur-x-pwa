<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AurX AI</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="msapplication-navbutton-color" content="#000">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preload" href="icon-static.png" as="image">

<!-- HLJS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

<!-- KATEX CSS - UNE SEULE FOIS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">

<!-- TON CSS PRINCIPAL -->
<link rel="stylesheet" href="style.css">

<style>
/* CSS CRITIQUE MESSAGES - MANQUAIT DANS TON HTML */
* { box-sizing: border-box; }
body { margin: 0; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

.msg-wrapper { display: flex; margin-bottom: 12px; }
.msg-wrapper.user { justify-content: flex-end; }
.msg-wrapper.bot, .msg-wrapper.bot-full { justify-content: flex-start; }

.msg {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: 18px;
  line-height: 1.5;
  word-wrap: break-word;
  font-size: 15px;
}
.msg.user { background: #0A84FF; color: #fff; border-bottom-right-radius: 4px; }
.msg.bot, .msg.bot-full-text { background: #1c1c1e; color: #fff; border-bottom-left-radius: 4px; }

.msg-time { font-size: 11px; color: #666; margin-top: 4px; text-align: right; }
.msg-wrapper.bot .msg-time, .msg-wrapper.bot-full .msg-time { text-align: left; }

pre {
  background: #1e1e1e !important;
  border: 1px solid #333;
  border-radius: 8px;
  margin: 12px 0;
  overflow: hidden;
}
pre code {
  display: block;
  padding: 16px;
  color: #e1e1e1;
  font-family: 'SF Mono', Monaco, monospace;
  font-size: 13px;
  line-height: 1.5;
  overflow-x: auto;
}

/* HEADER + CHAT + INPUT */
header {
  position: fixed; top: 0; left: 0; right: 0; height: 60px;
  background: #111; border-bottom: 1px solid #2a2a2a;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; z-index: 1000;
}
#chat { padding-top: 76px; padding-bottom: 100px; flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; }
.input-area {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #111; border-top: 1px solid #2a2a2a;
  padding: 12px 16px; z-index: 1000;
}
.input-wrap { display: flex; gap: 8px; align-items: flex-end; }
.input-box {
  flex: 1; background: #1c1c1e; border-radius: 20px;
  padding: 10px 16px; display: flex; align-items: center;
}
#input {
  flex: 1; background: transparent; border: none; outline: none;
  color: #fff; font-size: 15px; resize: none; max-height: 120px;
  font-family: inherit;
}

/* TON CSS EXISTANT - GARDE TOUT */
header .btn {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: transparent; border: 1px solid #444; color: #fff;
  padding: 6px 10px; border-radius: 12px; z-index: 1001; cursor: pointer;
}
header .btn:active { opacity: 0.7; }
#historyBtn { left: 16px; }
#settingsBtn { right: 16px; }
.settings-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid #333; }
.settings-section h3 { margin: 0 0 12px 0; font-size: 16px; color: #fff; }
.setting-item { margin-bottom: 14px; list-style: none; }
.setting-item label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; }
.info-text { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 12px; color: #fff; font-size: 14px; line-height: 1.5; }
.info-text a { color: #0A84FF; text-decoration: none; }
.info-text a:hover { text-decoration: underline; }
#continueBtn {
  position: relative; display: flex; align-items: center; justify-content: center;
  width: 100%; padding: 14px; background: #444; color: #888; border: none;
  border-radius: 12px; font-size: 16px; font-weight: 600; cursor: not-allowed;
}
#continueBtn.active { background: #0A84FF; color: #fff; cursor: pointer; }
#continueBtn.loading .btn-text { opacity: 0; position: absolute; }
#continueBtn .loader {
  display: none; width: 18px; height: 18px; border: 2px solid #fff;
  border-top: 2px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite;
}
#continueBtn.loading .loader { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }
.send-btn {
  width: 40px; height: 40px; background: #0A84FF; border: none; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; color: white;
  cursor: pointer; transition: transform 0.1s, opacity 0.2s; flex-shrink: 0;
}
.send-btn:active { transform: scale(0.92); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.send-btn .loader {
  display: none; width: 18px; height: 18px; border: 2px solid #fff;
  border-top: 2px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite;
}
.send-btn.loading .loader { display: block; }
.send-btn.loading svg { display: none; }
.circle-progress { position: relative; width: 32px; height: 32px; flex-shrink: 0; margin-left: 8px; list-style: none; }
.circle-progress svg { transform: rotate(-90deg); }
.circle-bg { fill: none; stroke: #333; stroke-width: 2; }
.circle-fg { fill: none; stroke: #0A84FF; stroke-width: 2; stroke-linecap: round; transition: stroke-dashoffset 0.2s, stroke 0.2s; }
.circle-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 10px; font-weight: 600; color: #fff; }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; pointer-events: none; }
.modal.open { display: flex; pointer-events: auto; }
.modal > div { background: #111; width: 90%; max-width: 420px; max-height: 85vh; border-radius: 16px; border: 1px solid #333; overflow: hidden; display: flex; flex-direction: column; }
.settings-header { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid #2a2a2a; background: #111; }
.settings-header h3 { color: #0A84FF; margin: 0; }
.close-btn { background: transparent; border: none; color: #fff; font-size: 24px; cursor: pointer; padding: 0 8px; }
.settings-body { overflow-y: auto; padding: 16px; background: #111; color: #fff; }
.danger-btn { width: 100%; padding: 12px; background: transparent; border: 1px solid #ff3b30; color: #ff3b30; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.danger-btn:active { background: #ff3b30; color: #fff; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 1999; pointer-events: auto; }
.overlay.open { display: block; }
.sidebar { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: #111; border-right: 1px solid #2a2a2a; transition: left 0.3s ease; z-index: 1500; display: flex; flex-direction: column; }
.sidebar.open { left: 0; }
.sidebar header { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid #2a2a2a; font-weight: 600; flex-shrink: 0; }
.sidebar-header-left { display: flex; align-items: center; gap: 10px; }
.new-chat-btn { position: static !important; transform: none; padding: 4px 8px; font-size: 13px; border-radius: 8px; }
.list { padding: 8px; overflow-y: auto; flex: 1; }
.sidebar-footer { 
  padding: 12px; border-top: 1px solid #2a2a2a; flex-shrink: 0; 
  display: flex; flex-direction: column; gap: 10px; 
}
.google-btn {
  width: 100%; padding: 10px; background: #fff; border: 1px solid #333;
  color: #000; border-radius: 8px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center;
}
.google-btn:active { opacity: 0.8; }
.google-btn.connected {
  background: transparent; border: 1px solid #ff3b30; color: #ff3b30;
}
.google-btn.connected:active { background: #ff3b30; color: #fff; }
.google-user-info {
  display: flex; align-items: center; gap: 8px; padding: 10px;
  background: #1a1a1a; border-radius: 8px; font-size: 13px; color: #fff; margin-bottom: 8px;
}
.google-user-info img { width: 24px; height: 24px; border-radius: 50%; }
.google-user-info span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.danger-btn-small { width: 100%; padding: 10px; background: transparent; border: 1px solid #ff3b30; color: #ff3b30; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
.danger-btn-small:active { background: #ff3b30; color: #fff; }
.conv-item { padding: 12px; border-radius: 8px; margin-bottom: 4px; cursor: pointer; color: #ccc; font-size: 14px; }
.conv-item:hover { background: #1a1a1a; color: #fff; }
.empty { padding: 20px; text-align: center; color: #666; font-size: 14px; }
#welcome {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; flex: 1; color: #fff; font-size: 32px; font-weight: 700;
  gap: 8px; user-select: none; pointer-events: none;
}
#welcome span { font-size: 16px; font-weight: 400; color: #666; }

/* TYPING INDICATOR */
.typing-wrapper { display: flex; align-items: center; gap: 10px; padding: 8px 16px; margin-bottom: 12px; }
.aurx-thinking { width: 36px; height: 36px; position: relative; flex-shrink: 0; overflow: visible; display: flex; align-items: center; justify-content: center; }
.aurx-thinking img { width: 36px; height: 36px; border-radius: 50%; object-fit: contain; display: block; }
.aurx-thinking.spinning img { animation: spinNeural 1.2s linear infinite; transform-origin: center center; }
@keyframes spinNeural { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.typing-text { font-size: 14px; color: #888; opacity: 0; transition: opacity 0.3s; }
.typing-text.show { opacity: 1; }

/* KATEX THEME SOMBRE */
.katex { color: #fff !important; font-size: 1.1em; border: none !important; background: transparent !important; padding: 0 !important; }
.katex-display { margin: 1.2em 0; overflow-x: auto; border: none !important; background: transparent !important; }
.katex-display > .katex { display: block; text-align: center; border: none !important; }
.katex-html { border: none !important; background: transparent !important; }
a, a:has(.katex), a .katex { border: none !important; background: transparent !important; padding: 0 !important; text-decoration: none; }
a:hover { text-decoration: underline; }
.inline-code { background: #1a1a1a; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
</style>
</head>
<body>
<!-- TON BODY RESTE IDENTIQUE -->
<button id="installBtn">Installer l'app</button>
<div id="termsScreen">...</div>
<header>...</header>
<div id="chat">...</div>
<div class="input-area">...</div>
<div class="sidebar" id="sidebar">
  <!-- GOOGLE AUTH EST DÉJÀ LÀ DANS TON HTML -->
  <div class="sidebar-footer">
    <div id="googleUserInfo" class="google-user-info" style="display:none;">
      <img id="googleUserPic" src="" alt="">
      <span id="googleUserName"></span>
    </div>
    <button class="google-btn" id="googleAuthBtn">
      <svg width="18" height="18" viewBox="0 0 18 18" style="vertical-align: -3px; margin-right: 8px;">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.71 0-.593.102-1.17.282-1.71V4.96H.957C.347 6.175 0 7.55 0 9c0 1.45.347 2.825.957 4.04l3.007-2.328z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.96L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      <span id="googleAuthText">Se connecter avec Google</span>
    </button>
    <button class="danger-btn-small" id="deleteAllBtn">WIPE CONVS</button>
  </div>
</div>
<div class="modal" id="settingsModal">...</div>
<div class="overlay" id="overlay"></div>

<script src="config.js"></script>
<script src="script.js"></script>

<!-- KATEX JS - SANS DEFER POUR QUE waitForKatex MARCHE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>

<script>
// === CONFIG BACKEND ===
const BACKEND_URL = 'https://aur-x-backend.vercel.app';

// === GOOGLE AUTH VIA BACKEND VERCEL ===
let googleUser = null;

async function checkAuth() {
  try {
    const res = await fetch(`${BACKEND_URL}/api/auth/me`, { credentials: 'include' });
    if (res.ok) {
      googleUser = await res.json();
      updateGoogleUI(true);
    }
  } catch (e) {
    console.log('Pas encore connecté');
  }
}

function updateGoogleUI(isConnected) {
  const googleBtn = document.getElementById('googleAuthBtn');
  const googleText = document.getElementById('googleAuthText');
  const userInfo = document.getElementById('googleUserInfo');
  const userPic = document.getElementById('googleUserPic');
  const userName = document.getElementById('googleUserName');

  if (isConnected && googleUser) {
    googleBtn.classList.add('connected');
    googleText.textContent = 'Se déconnecter';
    userInfo.style.display = 'flex';
    userPic.src = googleUser.picture || '';
    userName.textContent = googleUser.name || googleUser.email;
  } else {
    googleBtn.classList.remove('connected');
    googleText.textContent = 'Se connecter avec Google';
    userInfo.style.display = 'none';
  }
}

document.getElementById('googleAuthBtn')?.addEventListener('click', async () => {
  if (googleUser) {
    try {
      await fetch(`${BACKEND_URL}/api/auth/logout`, { 
        method: 'POST',
        credentials: 'include' 
      });
      googleUser = null;
      updateGoogleUI(false);
    } catch (e) {
      console.error('Erreur déconnexion:', e);
    }
  } else {
    window.location.href = `${BACKEND_URL}/api/auth/google`;
  }
});

// === WELCOME TOGGLE ===
function toggleWelcome() {
  const chat = document.getElementById('chat');
  const welcome = document.getElementById('welcome');
  if (!welcome) return;
  
  const hasMessages = chat.querySelector('.msg-wrapper, .typing-wrapper');
  welcome.style.display = hasMessages ? 'none' : 'flex';
}

// === KATEX HELPERS ===
function waitForKatex(callback) {
  if (typeof renderMathInElement !== 'undefined') {
    callback();
  } else {
    setTimeout(() => waitForKatex(callback), 100);
  }
}

let renderTimeout = null;

function renderMath(element = document.body) {
  if (!window.renderMathInElement) return;
  renderMathInElement(element, {
    delimiters: [
      {left: '$$', right: '$$', display: true},
      {left: '$', right: '$', display: false},
      {left: '\\[', right: '\\]', display: true},
      {left: '\\(', right: '\\)', display: false}
    ],
    throwOnError: false,
    strict: false,
    ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
    ignoredClasses: ['app-code-content', 'app-inline-code', 'copy-btn']
  });
}

document.addEventListener('DOMContentLoaded', () => {
  checkAuth();
  toggleWelcome();
  
  waitForKatex(() => {
    setTimeout(renderMath, 300);
    const chat = document.getElementById('chat');
    const observer = new MutationObserver(() => {
      clearTimeout(renderTimeout);
      renderTimeout = setTimeout(() => {
        renderMath();
        toggleWelcome();
      }, 200);
    });
    observer.observe(chat, { childList: true, subtree: true });
  });
});
</script>
</body>
</html>
