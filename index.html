<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AurX AI</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">

<meta name="theme-color" content="#000">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="msapplication-navbutton-color" content="#000">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preload" href="icon-static.png" as="image">

<style>
/* CSS Global et Structure de base */
header .btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: transparent;
  border: 1px solid #444;
  color: #fff;
  padding: 6px 10px;
  border-radius: 12px;
  z-index: 1001;
  cursor: pointer;
}
header .btn:active { opacity: 0.7; }
#historyBtn { left: 16px; }
#settingsBtn { right: 16px; }

/* RESTRUCTURATION DES PARAMÈTRES */
.settings-section { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid #222; }
.settings-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.settings-section h3 { margin: 0 0 14px 0; font-size: 14px; color: #0A84FF; text-transform: uppercase; letter-spacing: 0.5px; }

.setting-item { margin-bottom: 16px; list-style: none; }
.setting-item:last-child { margin-bottom: 0; }
.setting-item label { display: block; font-size: 13px; color: #aaa; margin-bottom: 8px; font-weight: 500; }

.setting-select, .setting-input {
  width: 100%;
  padding: 12px;
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 10px;
  color: #fff;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.setting-select:focus, .setting-input:focus { border-color: #0A84FF; }

.info-text { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 12px; color: #fff; font-size: 14px; line-height: 1.5; }
.info-text a { color: #0A84FF; text-decoration: none; }
.info-text a:hover { text-decoration: underline; }

.settings-action-btn {
  width: 100%;
  padding: 12px;
  background: #222;
  border: 1px solid #333;
  color: #fff;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 8px;
  transition: all 0.2s;
}
.settings-action-btn:hover { background: #2a2a2a; border-color: #444; }

#continueBtn {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 14px;
  background: #444;
  color: #888;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: not-allowed;
}
#continueBtn.active { background: #0A84FF; color: #fff; cursor: pointer; }
#continueBtn.loading .btn-text { opacity: 0; position: absolute; }
#continueBtn .loader {
  display: none;
  width: 18px;
  height: 18px;
  border: 2px solid #fff;
  border-top: 2px solid transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
#continueBtn.loading .loader { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

.send-btn {
  width: 40px;
  height: 40px;
  background: #0A84FF;
  border: none;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.2s;
  flex-shrink: 0;
}
.send-btn:active { transform: scale(0.92); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.send-btn .loader {
  display: none;
  width: 18px;
  height: 18px;
  border: 2px solid #fff;
  border-top: 2px solid transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.send-btn.loading .loader { display: block; }
.send-btn.loading svg { display: none; }
.circle-progress { position: relative; width: 32px; height: 32px; flex-shrink: 0; margin-left: 8px; list-style: none; }
.circle-progress svg { transform: rotate(-90deg); }
.circle-bg { fill: none; stroke: #333; stroke-width: 2; }
.circle-fg { fill: none; stroke: #0A84FF; stroke-width: 2; stroke-linecap: round; transition: stroke-dashoffset 0.2s, stroke 0.2s; }
.circle-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 10px; font-weight: 600; color: #fff; }
.input-box { align-items: center; }

/* CONFIGURATION DU SYSTEME DE MESSAGES */
#chat {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 16px;
  overflow-y: auto;
  flex: 1;
}
.msg-wrapper {
  display: flex;
  flex-direction: column;
  max-width: 80%;
  padding: 12px 16px;
  border-radius: 16px;
  position: relative;
  user-select: none;
  -webkit-user-select: none;
  cursor: pointer;
  transition: opacity 0.2s;
}
.msg-wrapper.user {
  align-self: flex-end;
  background: #0A84FF;
  color: #fff;
}
.msg-wrapper.assistant {
  align-self: flex-start;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  color: #fff;
}

/* CADRE D'OPTIONS FLOTTANT (MENU CONTEXTUEL) */
.context-menu {
  position: fixed;
  background: #1c1c1e;
  border: 1px solid #3a3a3c;
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.6);
  z-index: 3000;
  display: none;
  flex-direction: column;
  min-width: 150px;
  overflow: hidden;
}
.context-menu-item {
  padding: 12px 16px;
  font-size: 14px;
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: background 0.2s;
}
.context-menu-item:hover {
  background: #2c2c2e;
}
.context-menu-item:not(:last-child) {
  border-bottom: 1px solid #2c2c2e;
}

/* MODALES */
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; pointer-events: none; }
.modal.open { display: flex; pointer-events: auto; }
.modal > div { background: #0d0d0d; width: 92%; max-width: 460px; max-height: 85vh; border-radius: 20px; border: 1px solid #222; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
.settings-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; border-bottom: 1px solid #222; background: #0d0d0d; }
.settings-header h2 { color: #fff; margin: 0; font-size: 18px; font-weight: 600; }
.close-btn { background: transparent; border: none; color: #888; font-size: 24px; cursor: pointer; padding: 0 4px; transition: color 0.2s; }
.close-btn:hover { color: #fff; }
.settings-body { overflow-y: auto; padding: 20px; background: #0d0d0d; color: #fff; }

.danger-btn { width: 100%; padding: 12px; background: transparent; border: 1px solid #ff3b30; color: #ff3b30; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.danger-btn:active { background: #ff3b30; color: #fff; }

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 1999; pointer-events: auto; }
.overlay.open { display: block; }

/* SIDEBAR & FOOTER */
.sidebar { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: #111; border-right: 1px solid #2a2a2a; transition: left 0.3s ease; z-index: 1500; display: flex; flex-direction: column; }
.sidebar.open { left: 0; }
.sidebar header { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid #2a2a2a; font-weight: 600; flex-shrink: 0; }
.sidebar-header-left { display: flex; align-items: center; gap: 10px; }
.new-chat-btn { position: static !important; transform: none; padding: 4px 8px; font-size: 13px; border-radius: 8px; }
.list { padding: 8px; overflow-y: auto; flex: 1; }
.sidebar-footer { padding: 12px; border-top: 1px solid #2a2a2a; flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; }

.google-btn {
  width: 100%;
  padding: 10px;
  background: #fff;
  border: 1px solid #333;
  color: #000;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.google-btn:active { opacity: 0.8; }
.google-btn.connected { background: transparent; border: 1px solid #ff3b30; color: #ff3b30; }

.google-user-info { display: flex; flex-direction: column; gap: 8px; padding: 12px; background: #1a1a1a; border-radius: 8px; font-size: 12px; color: #fff; margin-bottom: 8px; }
.google-user-row { display: flex; align-items: center; gap: 10px; }
.google-user-info img { width: 34px; height: 34px; border-radius: 50%; border: 1px solid #333; }
.google-user-name { font-size: 14px; font-weight: 600; color: #fff; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.google-user-verified { display: inline-flex; align-items: center; font-size: 10px; padding: 2px 6px; border-radius: 20px; font-weight: 500; margin-top: 2px; }
.google-user-detail { font-size: 11px; color: #888; padding-left: 44px; word-break: break-all; }

/* WELCOME & TYPING */
#welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; flex: 1; color: #fff; font-size: 32px; font-weight: 700; gap: 8px; user-select: none; pointer-events: none; }
#welcome span { font-size: 16px; font-weight: 400; color: #666; }

.typing-wrapper { display: flex; align-items: center; gap: 10px; padding: 8px 16px; margin-bottom: 12px; }
.aurx-thinking { width: 36px; height: 36px; position: relative; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.aurx-thinking img { width: 36px; height: 36px; border-radius: 50%; object-fit: contain; }
.typing-text { font-size: 14px; color: #888; opacity: 0; transition: opacity 0.3s; }
.typing-text.show { opacity: 1; }

/* KATEX STYLES */
.katex { color: #fff !important; font-size: 1.1em; border: none !important; background: transparent !important; padding: 0 !important; }
.katex-display { margin: 1.2em 0; overflow-x: auto; border: none !important; background: transparent !important; }
</style>
</head>
<body>
<button id="installBtn">Installer l'app</button>

<div id="termsScreen">
<h2>Conditions d'utilisation AurX AI</h2>
<div id="termsContent">
<h3>1. Acceptation</h3><p>En utilisant AurX AI, vous acceptez toutes les conditions.</p>
<div class="terms-check">
<input type="checkbox" id="acceptTerms">
<label for="acceptTerms">J'accepte les conditions</label>
</div>
</div>
<button id="continueBtn" disabled>
<span class="loader"></span>
<span class="btn-text">Continuer</span>
</button>
</div>

<header>
<button class="btn" id="historyBtn">☰</button>
AurX AI
<button class="btn" id="settingsBtn">⚙</button>
</header>

<div id="chat">
<div id="welcome">AurX AI<span>Pose-moi une question</span></div>
</div>

<div id="msgContextMenu" class="context-menu">
  <div class="context-menu-item" id="ctxEdit">✏️ Modifier</div>
  <div class="context-menu-item" id="ctxShare">🔗 Partager</div>
  <div class="context-menu-item" id="ctxRetry">🔄 Réessayer</div>
</div>

<div class="input-area">
<div class="input-wrap">
<div class="input-box">
<textarea id="input" rows="1" placeholder="Répondre à AurX..."></textarea>
<div class="circle-progress">
<svg width="32" height="32">
<circle class="circle-bg" cx="16" cy="16" r="13"/>
<circle class="circle-fg" cx="16" cy="16" r="13" stroke-dasharray="81.68" stroke-dashoffset="81.68"/>
</svg>
<div class="circle-text">0</div>
</div>
</div>
<button class="send-btn" id="sendBtn">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none">
<path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
<span class="loader"></span>
</button>
</div>
</div>

<div class="sidebar" id="sidebar">
<header>
<div class="sidebar-header-left">
<span>Historique</span>
<button class="btn new-chat-btn" id="newChatBtn">+ Nouveau</button>
</div>
<button class="close-btn" id="closeSidebar">×</button>
</header>
<div class="list" id="convList"></div>
<div class="sidebar-footer">
<div id="googleUserInfo" class="google-user-info" style="display:none;">
<div class="google-user-row">
<img id="googleUserPic" src="" alt="">
<div>
<div class="google-user-name" id="googleUserName"></div>
<div class="google-user-verified" id="googleUserVerified">Analyse...</div>
</div>
</div>
<div class="google-user-detail"><strong>Email:</strong> <span id="googleUserEmail"></span></div>
</div>
<button class="google-btn" id="googleAuthBtn"><span id="googleAuthText">Se connecter avec Google</span></button>
<button class="danger-btn-small" id="deleteAllBtn">WIPE CONVS</button>
</div>
</div>

<div class="modal" id="settingsModal">
<div>
<div class="settings-header">
<h2>Paramètres</h2>
<button class="close-btn" id="closeSettings">×</button>
</div>
<div class="settings-body">
  <div class="settings-section">
    <h3>👤 Gestion du Compte</h3>
    <div class="setting-item"><div class="info-text" id="accountSyncStatus">Chargement...</div></div>
  </div>
  <div class="settings-section">
    <h3>🤖 Intelligence & Modèle</h3>
    <div class="setting-item">
      <select id="modelSelect" class="setting-select">
        <option value="aurx-standard" selected>AurX Standard</option>
        <option value="aurx-pro">AurX Pro</option>
      </select>
    </div>
  </div>
</div>
</div>
</div>

<div class="overlay" id="overlay"></div>

<script src="config.js"></script>
<script src="script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>

<script>
const BACKEND_URL = 'https://aur-x-backend.vercel.app';
let googleUser = null;

// GESTION DU RE-POSTING & EDITION SANS DOUBLONS
let currentEditingMessageElement = null; 
let activeTargetMessage = null; 

// CONFIGURATION CONTEXT-MENU (APPUI LONG ET CLIC STRUCTURÉ)
const contextMenu = document.getElementById('msgContextMenu');
let pressTimer;

function openContextMenu(e, targetElement) {
  e.preventDefault();
  activeTargetMessage = targetElement;
  
  const isUser = targetElement.classList.contains('user');
  document.getElementById('ctxEdit').style.display = isUser ? 'flex' : 'none';
  document.getElementById('ctxRetry').style.display = !isUser ? 'flex' : 'none';

  contextMenu.style.display = 'flex';
  contextMenu.style.top = `${Math.min(e.clientY, window.innerHeight - 150)}px';
  contextMenu.style.left = `${Math.min(e.clientX, window.innerWidth - 180)}px';
}

function closeContextMenu() {
  contextMenu.style.display = 'none';
}

// INJECTION DES ÉVÉNEMENTS SUR LES MESSAGES
function attachMessageEvents(element) {
  element.addEventListener('contextmenu', (e) => openContextMenu(e, element));

  // Support tactile (Appui Long)
  element.addEventListener('touchstart', (e) => {
    pressTimer = setTimeout(() => openContextMenu(e.touches[0], element), 600);
  }, {passive: true});

  element.addEventListener('touchend', () => clearTimeout(pressTimer));
}

// LOGIQUE DES OPTIONS DU CADRE FLOTTANT
document.getElementById('ctxEdit').addEventListener('click', () => {
  if (!activeTargetMessage) return;
  const currentText = activeTargetMessage.innerText;
  const inputArea = document.getElementById('input');
  
  inputArea.value = currentText;
  currentEditingMessageElement = activeTargetMessage; 
  inputArea.focus();
  closeContextMenu();
});

document.getElementById('ctxShare').addEventListener('click', () => {
  if (!activeTargetMessage) return;
  navigator.clipboard.writeText(activeTargetMessage.innerText);
  alert('Contenu copié dans le presse-papiers !');
  closeContextMenu();
});

document.getElementById('ctxRetry').addEventListener('click', () => {
  alert('Régénération de la réponse lancée...');
  closeContextMenu();
});

document.addEventListener('click', (e) => {
  if (!contextMenu.contains(e.target)) closeContextMenu();
});

// INTERCEPTION DE L'ENVOI POUR METTRE À JOUR SANS CRÉER DE DOUBLON
document.getElementById('sendBtn').addEventListener('click', () => {
  const inputArea = document.getElementById('input');
  const text = inputArea.value.trim();
  if (!text) return;

  if (currentEditingMessageElement) {
    // Si nous modifions un message existant, on le met à jour au lieu d'en rajouter un nouveau
    currentEditingMessageElement.innerText = text;
    currentEditingMessageElement = null; 
  } else {
    // Processus de création classique
    const newMsg = document.createElement('div');
    newMsg.className = 'msg-wrapper user';
    newMsg.innerText = text;
    document.getElementById('chat').appendChild(newMsg);
    attachMessageEvents(newMsg);
  }
  
  inputArea.value = '';
  closeContextMenu();
});

// INITIALISATION DE L'AUTH GOOGLE
async function checkAuth() {
  try {
    const res = await fetch(`${BACKEND_URL}/api/auth/me`, { credentials: 'include' });
    if (res.ok) {
      googleUser = await res.json();
      updateGoogleUI(true);
    } else {
      updateGoogleUI(false);
    }
  } catch (e) {
    updateGoogleUI(false);
  }
}

function updateGoogleUI(isConnected) {
  const accountSyncStatus = document.getElementById('accountSyncStatus');
  if (isConnected && googleUser) {
    if (accountSyncStatus) accountSyncStatus.innerHTML = `Connecté en tant que <strong>${googleUser.name}</strong>.`;
  } else {
    if (accountSyncStatus) accountSyncStatus.innerHTML = `Mode invité actif.`;
  }
}

document.addEventListener('DOMContentLoaded', () => {
  checkAuth();
});
</script>
</body>
</html>
